<aside class="sidebar" role="complementary" aria-label="Site navigation">
  <div class="container sidebar-sticky">
    <div class="sidebar-about">
      <a href="{{ .Site.BaseURL }}" aria-label="Home"><img src="/images/avatar.jpg" alt="{{ .Site.Title }} - {{ .Site.Params.jobTitle }}" /></a>
      <h1>{{ .Site.Title }}</h1>
      <p class="lead">
        {{ .Site.Params.jobTitle }}
      </p>
      <p class="description">
        {{ .Site.Params.description -}}
      </p>
    </div>

    <nav aria-label="Main navigation">
      <ul class="sidebar-nav">
        <li><a href="{{ .Site.BaseURL }}">Home</a> </li>
        {{ range .Site.Menus.main -}}
          <li><a href="{{.URL}}"> {{ .Name }} </a></li>
        {{- end }}
      </ul>
    </nav>

    <p>{{ with .Site.Params.copyright }}{{.}}{{ else }}&copy; {{ .Site.Params.AuthorName }} {{ now.Format "2006"}}. All rights reserved. {{end}}</p>
  </div>
</aside>
